<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart — Brewhaus Coffee</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="/" class="nav-logo"><span class="nav-logo-dot"></span>Brewhaus</a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li><li><a href="/menu">Menu</a></li>
      <li><a href="/orders">My Orders</a></li>
      <li><a href="#" id="authNavLink">Sign In</a></li>
      <li><a href="/cart" class="nav-cart active">🛒 Cart <span class="cart-badge">0</span></a></li>
    </ul>
    <button class="hamburger"><span></span><span></span><span></span></button>
  </div>
</nav>

<div class="page-header">
  <div class="page-header-bg"></div>
  <div class="container" style="position:relative;">
    <div class="section-label" style="margin-bottom:10px;">Review</div>
    <h1 style="font-family:'Cormorant Garamond',serif;font-size:2.8rem;color:var(--cream);font-weight:600;">Your Cart</h1>
  </div>
</div>

<div class="container" style="padding-top:44px;padding-bottom:80px;">
  <div id="emptyCart" style="display:none">
    <div class="empty-state">
      <span class="icon">☕</span>
      <h3>Your cart is empty</h3>
      <p style="margin-bottom:28px;color:rgba(253,246,236,0.35);">Add some drinks or food to get started</p>
      <a href="/menu" class="btn btn-primary" style="font-size:1rem;padding:13px 28px;">Browse Menu</a>
    </div>
  </div>

  <div id="cartFull" class="cart-layout">
    <div>
      <div class="card" style="padding:0;">
        <div style="padding:20px 24px;border-bottom:1px solid rgba(200,135,58,0.08);display:flex;justify-content:space-between;align-items:center;">
          <h2 style="font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;color:var(--cream);">Items (<span id="itemCount">0</span>)</h2>
          <button class="btn btn-sm" style="color:var(--danger);border:1px solid rgba(184,58,42,0.25);background:transparent;" onclick="clearAll()">Clear All</button>
        </div>
        <div id="cartItemsList"></div>
      </div>
      <a href="/menu" style="display:inline-flex;align-items:center;gap:6px;margin-top:16px;color:var(--caramel);text-decoration:none;font-size:0.875rem;font-weight:500;transition:color 0.2s;">
        ← Continue Shopping
      </a>
    </div>

    <div class="order-summary">
      <div class="card" style="padding:28px;">
        <h2 style="font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;margin-bottom:20px;color:var(--cream);">Order Summary</h2>
        <div class="promo-wrap">
          <input type="text" id="promoInput" placeholder="Promo code" style="text-transform:uppercase;letter-spacing:1px;">
          <button class="btn btn-outline-dark btn-sm" onclick="applyPromo()">Apply</button>
        </div>
        <div id="promoMsg" style="font-size:0.82rem;margin-bottom:12px;display:none;"></div>
        <div class="summary-row"><span>Subtotal</span><span id="subtotalVal">₱0</span></div>
        <div class="summary-row" id="discRow" style="display:none;color:#34D399;"><span>Discount</span><span id="discVal">-₱0</span></div>
        <div class="summary-row"><span style="font-size:0.82rem;color:rgba(253,246,236,0.35);">Delivery (if applicable)</span><span style="font-size:0.82rem;color:rgba(253,246,236,0.35);">+₱60</span></div>
        <div class="summary-row summary-total" style="padding-top:16px;"><span>Subtotal</span><span id="totalVal">₱0</span></div>
        <a href="/checkout" class="btn btn-primary btn-block" style="margin-top:20px;font-size:0.95rem;padding:15px;">
          Proceed to Checkout →
        </a>
      </div>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
let appliedPromo = localStorage.getItem('brewhaus_promo') || null;
if (appliedPromo) { setTimeout(()=>{ document.getElementById('promoInput').value = appliedPromo; }, 100); }

function getDiscount(sub) {
  if (appliedPromo === 'BREW10') return Math.floor(sub * 0.1);
  if (appliedPromo === 'WELCOME') return 50;
  return 0;
}

function renderCart() {
  const items = Cart.items;
  document.getElementById('emptyCart').style.display = items.length ? 'none' : 'block';
  document.getElementById('cartFull').style.display = items.length ? 'grid' : 'none';
  if (!items.length) return;
  document.getElementById('itemCount').textContent = Cart.count;
  const list = document.getElementById('cartItemsList');
  list.innerHTML = items.map(item => {
    const photo = getItemPhoto(item.name);
    return `
      <div class="cart-item">
        <div class="cart-thumb">
          ${photo ? `<img src="${photo}" alt="${item.name}" style="width:100%;height:100%;object-fit:cover;">` : EMOJIS[item.category]||'☕'}
        </div>
        <div class="cart-info">
          <div class="cart-name">${item.name}</div>
          <div class="cart-mods">${item.mods&&item.mods.length?item.mods.join(' · '):'Regular'}</div>
          <div class="cart-controls">
            <button class="mini-btn" onclick="updQty('${item.cartId}',${item.qty-1})">−</button>
            <span style="font-weight:700;min-width:20px;text-align:center;color:var(--cream);">${item.qty}</span>
            <button class="mini-btn" onclick="updQty('${item.cartId}',${item.qty+1})">+</button>
            <button class="remove-btn" onclick="rmItem('${item.cartId}')">✕ Remove</button>
          </div>
        </div>
        <div class="cart-price">${formatPrice(item.totalPrice*item.qty)}</div>
      </div>`; }).join('');

  const sub = Cart.subtotal;
  const disc = getDiscount(sub);
  document.getElementById('subtotalVal').textContent = formatPrice(sub);
  document.getElementById('totalVal').textContent = formatPrice(sub - disc);
  const dr = document.getElementById('discRow');
  if (disc > 0) { dr.style.display='flex'; document.getElementById('discVal').textContent=`-${formatPrice(disc)}`; }
  else dr.style.display='none';
}

function applyPromo() {
  const code = document.getElementById('promoInput').value.trim().toUpperCase();
  const msg = document.getElementById('promoMsg');
  msg.style.display = 'block';
  if (code === 'BREW10') { appliedPromo = code; msg.style.color='#34D399'; msg.textContent='✓ 10% off applied!'; localStorage.setItem('brewhaus_promo',code); }
  else if (code === 'WELCOME') { appliedPromo = code; msg.style.color='#34D399'; msg.textContent='✓ ₱50 discount applied!'; localStorage.setItem('brewhaus_promo',code); }
  else { appliedPromo=null; msg.style.color='#F87171'; msg.textContent='✕ Invalid promo code'; localStorage.removeItem('brewhaus_promo'); }
  renderCart();
}

function rmItem(id) { Cart.remove(id); renderCart(); }
function updQty(id, q) { Cart.updateQty(id, q); renderCart(); }
function clearAll() { if(confirm('Remove all items?')) { Cart.clear(); renderCart(); } }

renderCart();
</script>
</body>
</html>
