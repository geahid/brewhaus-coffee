<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account — Brewhaus Coffee</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="/" class="nav-logo"><span class="nav-logo-dot"></span>Brewhaus</a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li><li><a href="/menu">Menu</a></li>
      <li><a href="/orders">My Orders</a></li>
      <li><a href="/account" class="active">Account</a></li>
      <li><a href="/cart" class="nav-cart">🛒 Cart <span class="cart-badge">0</span></a></li>
    </ul>
    <button class="hamburger"><span></span><span></span><span></span></button>
  </div>
</nav>

<div class="page-header">
  <div class="page-header-bg"></div>
  <div class="container" style="position:relative;">
    <div class="section-label" style="margin-bottom:10px;">Profile</div>
    <h1 style="font-family:'Cormorant Garamond',serif;font-size:2.8rem;color:var(--cream);font-weight:600;">My Account</h1>
  </div>
</div>

<div class="container" style="padding-top:44px;padding-bottom:80px;">
  <div id="guestView" style="display:none;">
    <div class="empty-state">
      <span class="icon">☕</span>
      <h3>Sign in to continue</h3>
      <p style="margin-bottom:28px;color:rgba(253,246,236,0.35);">Access your orders, points, and saved preferences.</p>
      <button class="btn btn-primary" style="font-size:1rem;padding:13px 28px;" onclick="showAuthModal()">Sign In / Register</button>
    </div>
  </div>

  <div id="userView" style="display:none;" class="account-grid">
    <div>
      <div class="points-card">
        <div style="font-size:0.68rem;color:rgba(253,246,236,0.35);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;position:relative;z-index:1;">Loyalty Points</div>
        <div class="points-val" id="pointsVal">0</div>
        <div class="points-lbl">₱1 = 1 point · Redeem soon</div>
      </div>
      <ul class="acct-nav">
        <li><a href="#" class="active" onclick="showTab('profile',this)">👤 Profile</a></li>
        <li><a href="#" onclick="showTab('orders',this)">📋 Orders</a></li>
        <li><a href="#" onclick="doLogout()">🚪 Sign Out</a></li>
      </ul>
    </div>
    <div>
      <div id="tab-profile">
        <div class="card" style="padding:32px;">
          <h3 style="font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;margin-bottom:24px;color:var(--cream);">Profile Information</h3>
          <div class="form-group"><label>Full Name</label><input type="text" id="pName"></div>
          <div class="form-group"><label>Email</label><input type="email" id="pEmail" disabled style="opacity:0.4;"></div>
          <button class="btn btn-primary" onclick="saveProfile()" style="padding:12px 28px;">Save Changes</button>
        </div>
      </div>
      <div id="tab-orders" style="display:none;">
        <h3 style="font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;margin-bottom:20px;color:var(--cream);">Order History</h3>
        <div id="acctOrders"><div class="loader"><div class="spinner"></div></div></div>
      </div>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
function showTab(tab, link) {
  document.querySelectorAll('[id^="tab-"]').forEach(t=>t.style.display='none');
  document.getElementById(`tab-${tab}`).style.display='block';
  document.querySelectorAll('.acct-nav a').forEach(a=>a.classList.remove('active'));
  if (link) link.classList.add('active');
  if (tab==='orders') loadOrders();
}
async function saveProfile() {
  const name=document.getElementById('pName').value.trim();
  if (!name) return Toast.show('Name cannot be empty','error');
  const r=await fetch('/api/users/profile',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({name})});
  const d=await r.json();
  if (d.success) { Auth.user.name=name; localStorage.setItem('brewhaus_user',JSON.stringify(Auth.user)); Toast.show('Profile updated!'); }
}
async function doLogout() {
  await Auth.logout(); Toast.show('Signed out ☕'); setTimeout(()=>window.location.href='/',800);
}
async function loadOrders() {
  const el=document.getElementById('acctOrders');
  try {
    const res=await fetch('/api/orders'); const orders=await res.json();
    if (!orders.length) { el.innerHTML=`<div class="empty-state"><span class="icon">📋</span><h3>No orders yet</h3><a href="/menu" class="btn btn-primary" style="margin-top:16px;">Order Now</a></div>`; return; }
    el.innerHTML=orders.map(o=>`
      <div class="card" style="padding:22px;margin-bottom:16px;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:12px;">
          <div>
            <div style="font-weight:700;font-size:0.95rem;color:var(--cream);">Order #${o.shortId}</div>
            <div style="font-size:0.8rem;color:rgba(253,246,236,0.3);">${formatDate(o.createdAt)}</div>
          </div>
          <div style="text-align:right;">
            <span class="badge badge-${o.status}">${o.status}</span>
            <div style="font-family:'Cormorant Garamond',serif;font-weight:700;font-size:1.2rem;margin-top:6px;color:var(--caramel);">${formatPrice(o.total)}</div>
          </div>
        </div>
        <div style="font-size:0.85rem;color:rgba(253,246,236,0.35);margin-bottom:14px;">${o.items.map(i=>`${i.name} × ${i.qty}`).join(', ')}</div>
        <div style="display:flex;gap:8px;">
          <a href="/orders?id=${o.id}" class="btn btn-outline-dark btn-sm">Track</a>
          <button class="btn btn-sm" style="background:rgba(200,135,58,0.1);color:var(--caramel);border:1px solid rgba(200,135,58,0.2);" onclick="reorder('${o.id}')">🔄 Reorder</button>
        </div>
      </div>`).join('');
  } catch { el.innerHTML='<p style="color:rgba(253,246,236,0.3);">Failed to load orders.</p>'; }
}
async function reorder(id) {
  const r=await fetch(`/api/orders/${id}/reorder`,{method:'POST'}); const d=await r.json();
  if (d.items) { d.items.forEach(i=>Cart.add({...i})); Toast.show('Items added to cart!'); setTimeout(()=>window.location.href='/cart',800); }
}
(async()=>{
  const user=await Auth.fetchMe();
  if (!user) { document.getElementById('guestView').style.display='block'; }
  else {
    document.getElementById('userView').style.display='grid';
    document.getElementById('pointsVal').textContent=user.points;
    document.getElementById('pName').value=user.name;
    document.getElementById('pEmail').value=user.email;
  }
})();
</script>
</body>
</html>
